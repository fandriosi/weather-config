# Perfil de produção
spring:
  application:
    name: Sistema de estacao meteorologica
  datasource:
    url: jdbc:postgresql://prod-db:5432/weather_prod?sslmode=verify-full&sslrootcert=/certs/global-bundle.pem&connectTimeout=5&socketTimeout=30
    driverClassName: org.postgresql.Driver
    username: ${RDSUSER}
    password: ${RDSPASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  tenancy:
    default-tenant-id: sensitec-cloud
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET}
      expiration-minutes: 60
  iot:
    ingest:
      max-skew-seconds: 300
      hmac-secret: ${APP_IOT_INGEST_HMAC_SECRET}
  cors:
    allow-credentials: false
  dynamodb:
    region: us-east-1
    payload-reserved-keys: idEstacao,timestamp,tenant_id
    payload-ignore-prefixes: ""
    table-name: WeatherMensuracao

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: never
