# Perfil de desenvolvimento
spring:
  application:
    name: Sistema de estacao meteorologica
  datasource:
    url: jdbc:postgresql://localhost:5432/weather
    driverClassName: org.postgresql.Driver
    username: ${RDSUSER}
    password: ${RDSPASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  name: weather
  tenancy:
    default-tenant-id: sensitec-cloud
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET}
      expiration-minutes: ${APP_SECURITY_JWT_EXPIRATION_MINUTES:60}
  iot:
    ingest:
      max-skew-seconds: 300
      hmac-secret: ${APP_IOT_INGEST_HMAC_SECRET}
  cors:
    allow-credentials: false
  dynamodb:
    region: us-east-1
    payload-reserved-keys: idEstacao,timestamp,tenant_id
    payload-ignore-prefixes: ""
    table-name: WetherMensurement
  storage:
    type: LOCAL # ou S3 se usar AWS
    local:
      basePath: storage
    s3:
      bucket: ${APP_STORAGE_S3_BUCKET}
      region: ${APP_STORAGE_S3_REGION}
      prefix: sensors
      accessKey: ${APP_STORAGE_S3_ACCESS_KEY}
      secretKey: ${APP_STORAGE_S3_SECRET_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: never
