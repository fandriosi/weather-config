# Development profile

spring.datasource.url=jdbc:postgresql://${RDSHOST:localhost}:${RDSPORT:5432}/${RDS_DB:weather}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${RDSUSER:weather}
spring.datasource.password=${RDSPASSWORD:@weather43}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:change-this-secret}
app.security.jwt.expiration-minutes=${APP_SECURITY_JWT_EXPIRATION_MINUTES:60}
app.iot.ingest.hmac-secret=${APP_IOT_INGEST_HMAC_SECRET:change-this-iot-hmac-secret}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

app.dynamodb.table-name=${DYNAMODB_TABLE_NAME:WetherMensurement}
app.dynamodb.endpoint=${DYNAMODB_ENDPOINT:}
app.dynamodb.access-key=${AWS_ACCESS_KEY_ID:}
app.dynamodb.secret-key=${AWS_SECRET_ACCESS_KEY:}
app.dynamodb.session-token=${AWS_SESSION_TOKEN:}

app.storage.type=${APP_STORAGE_TYPE:LOCAL}
app.storage.local.base-path=${APP_STORAGE_LOCAL_BASE_PATH:storage}
