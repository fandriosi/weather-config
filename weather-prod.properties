# Production profile

spring.datasource.url=jdbc:postgresql://${RDSHOST}:${RDSPORT:5432}/${RDS_DB}?sslmode=${RDS_SSLMODE:verify-full}&sslrootcert=${RDS_SSLROOTCERT:/certs/global-bundle.pem}&connectTimeout=${RDS_CONNECT_TIMEOUT:5}&socketTimeout=${RDS_SOCKET_TIMEOUT:30}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${RDSUSER}
spring.datasource.password=${RDSPASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET}
app.security.jwt.expiration-minutes=${APP_SECURITY_JWT_EXPIRATION_MINUTES:60}
app.iot.ingest.hmac-secret=${APP_IOT_INGEST_HMAC_SECRET}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

app.dynamodb.table-name=${DYNAMODB_TABLE_NAME:WeatherMensuracao}
app.dynamodb.endpoint=${DYNAMODB_ENDPOINT:}

app.storage.type=${APP_STORAGE_TYPE:S3}
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET}
app.storage.s3.region=${APP_STORAGE_S3_REGION:${AWS_REGION:us-east-1}}
app.storage.s3.prefix=${APP_STORAGE_S3_PREFIX:sensors}
